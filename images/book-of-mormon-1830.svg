<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='500' viewBox='0 0 1200 500'>
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#0f1829'/>
      <stop offset='100%' style='stop-color:#1a2744'/>
    </linearGradient>
    <linearGradient id='bookGrad' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#8B6914'/>
      <stop offset='100%' style='stop-color:#5a4209'/>
    </linearGradient>
  </defs>
  <rect width='1200' height='500' fill='url(#bg)'/>
  <!-- book -->
  <rect x='410' y='80' width='180' height='340' fill='url(#bookGrad)' rx='4'/>
  <rect x='590' y='80' width='180' height='340' fill='#7a5a12' rx='4'/>
  <!-- spine -->
  <rect x='400' y='80' width='14' height='340' fill='#c9a84c' rx='2'/>
  <!-- pages left -->
  <line x1='415' y1='100' x2='585' y2='100' stroke='#f5e9c8' stroke-width='0.8' opacity='0.3'/>
  <line x1='415' y1='118' x2='585' y2='118' stroke='#f5e9c8' stroke-width='0.8' opacity='0.3'/>
  <line x1='415' y1='136' x2='585' y2='136' stroke='#f5e9c8' stroke-width='0.8' opacity='0.3'/>
  <line x1='415' y1='154' x2='585' y2='154' stroke='#f5e9c8' stroke-width='0.8' opacity='0.3'/>
  <line x1='415' y1='172' x2='585' y2='172' stroke='#f5e9c8' stroke-width='0.8' opacity='0.3'/>
  <line x1='415' y1='190' x2='585' y2='190' stroke='#f5e9c8' stroke-width='0.8' opacity='0.3'/>
  <!-- title on cover -->
  <text x='680' y='190' text-anchor='middle' font-family='Georgia,serif' font-size='16' fill='#c9a84c' font-weight='bold'>BOOK OF</text>
  <text x='680' y='215' text-anchor='middle' font-family='Georgia,serif' font-size='16' fill='#c9a84c' font-weight='bold'>MORMON</text>
  <line x1='630' y1='225' x2='730' y2='225' stroke='#c9a84c' stroke-width='1' opacity='0.6'/>
  <text x='680' y='250' text-anchor='middle' font-family='Georgia,serif' font-size='11' fill='#e8c96a' opacity='0.8'>AN ACCOUNT WRITTEN BY</text>
  <text x='680' y='270' text-anchor='middle' font-family='Georgia,serif' font-size='11' fill='#e8c96a' opacity='0.8'>THE HAND OF MORMON</text>
  <text x='680' y='310' text-anchor='middle' font-family='Georgia,serif' font-size='10' fill='#c9a84c' opacity='0.7'>Palmyra: Printed by E.B. Grandin</text>
  <text x='680' y='328' text-anchor='middle' font-family='Georgia,serif' font-size='10' fill='#c9a84c' opacity='0.7'>For the Author · 1830</text>
  <!-- glow -->
  <ellipse cx='600' cy='250' rx='250' ry='180' fill='#c9a84c' opacity='0.04'/>
  <!-- text -->
  <text x='600' y='455' text-anchor='middle' font-family='Georgia,serif' font-size='22' fill='#c9a84c' opacity='0.9'>The Book of Mormon · First Edition, 1830</text>
  <text x='600' y='480' text-anchor='middle' font-family='Georgia,serif' font-size='14' fill='rgba(255,255,255,0.4)'>Printed by E.B. Grandin · Palmyra, New York</text>
</svg>