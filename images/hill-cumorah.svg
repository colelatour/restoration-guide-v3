<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='500' viewBox='0 0 1200 500'>
  <defs>
    <linearGradient id='sky' x1='0%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' style='stop-color:#1a2744'/>
      <stop offset='60%' style='stop-color:#243260'/>
      <stop offset='100%' style='stop-color:#2d3d6e'/>
    </linearGradient>
    <linearGradient id='hill' x1='0%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' style='stop-color:#2a3d20'/>
      <stop offset='100%' style='stop-color:#1a2714'/>
    </linearGradient>
  </defs>
  <rect width='1200' height='500' fill='url(#sky)'/>
  <!-- stars -->
  <circle cx='200' cy='60' r='1.5' fill='white' opacity='0.6'/>
  <circle cx='350' cy='40' r='1' fill='white' opacity='0.5'/>
  <circle cx='500' cy='80' r='1.5' fill='white' opacity='0.4'/>
  <circle cx='700' cy='50' r='1' fill='white' opacity='0.6'/>
  <circle cx='900' cy='70' r='1.5' fill='white' opacity='0.5'/>
  <circle cx='1050' cy='35' r='1' fill='white' opacity='0.4'/>
  <!-- hill -->
  <ellipse cx='600' cy='420' rx='550' ry='180' fill='url(#hill)'/>
  <!-- monument base -->
  <rect x='565' y='230' width='70' height='140' fill='#8a9090' rx='2'/>
  <rect x='558' y='356' width='84' height='20' fill='#6a7070' rx='1'/>
  <rect x='550' y='368' width='100' height='16' fill='#5a6060'/>
  <!-- angel moroni silhouette -->
  <line x1='600' y1='230' x2='600' y2='140' stroke='#c9a84c' stroke-width='3'/>
  <ellipse cx='600' cy='128' rx='10' ry='14' fill='#c9a84c'/>
  <path d='M590 138 Q570 150 560 165 Q580 158 600 155 Q620 158 640 165 Q630 150 610 138 Z' fill='#c9a84c'/>
  <!-- arms with trumpet -->
  <path d='M600 142 Q625 135 645 128' stroke='#c9a84c' stroke-width='2.5' fill='none'/>
  <path d='M645 128 L660 122' stroke='#c9a84c' stroke-width='3' fill='none'/>
  <!-- glow around angel -->
  <ellipse cx='600' cy='140' rx='60' ry='60' fill='#c9a84c' opacity='0.08'/>
  <ellipse cx='600' cy='140' rx='30' ry='30' fill='#e8c96a' opacity='0.1'/>
  <!-- text -->
  <text x='600' y='455' text-anchor='middle' font-family='Georgia,serif' font-size='22' fill='#c9a84c' opacity='0.9'>Hill Cumorah · Manchester, New York</text>
  <text x='600' y='480' text-anchor='middle' font-family='Georgia,serif' font-size='14' fill='rgba(255,255,255,0.4)'>Where Joseph Smith retrieved the gold plates · Angel Moroni monument</text>
</svg>