      <stop offset='0%' style='stop-color:#0f1829'/>
      <stop offset='100%' style='stop-color:#1a2744'/>
    </linearGradient>
    <linearGradient id='ground' x1='0%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' style='stop-color:#2a3d20'/>
      <stop offset='100%' style='stop-color:#1a2714'/>
    </linearGradient>
    <radialGradient id='light' cx='50%' cy='30%' r='35%'>
      <stop offset='0%' style='stop-color:#f5e9c8;stop-opacity:0.25'/>
      <stop offset='100%' style='stop-color:#0f1829;stop-opacity:0'/>
    </radialGradient>
  </defs>
  <rect width='1200' height='500' fill='url(#sky)'/>
  <ellipse cx='600' cy='150' rx='200' ry='120' fill='url(#light)'/>
